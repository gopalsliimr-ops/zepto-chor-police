<!DOCTYPE html><html class="dark" lang="en"><head>

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 81, 103, 0.5);
        }
        .btn-inner-glow {
            box-shadow: inset 0px 4px 10px rgba(255, 255, 255, 0.2), 0 4px 15px rgba(255, 81, 103, 0.4);
        }
        .btn-inner-glow:active {
            box-shadow: inset 0px 2px 5px rgba(0, 0, 0, 0.2);
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-[#1A0A2E] text-on-surface h-screen w-full flex items-center justify-center font-body-sm overflow-hidden antialiased">
<!-- Mobile Container (390px wide constraint as requested) -->
<main class="w-full max-w-[390px] px-[20px] flex flex-col items-center gap-lg relative z-10">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-sm w-full">
<!-- Logo / Brand Icon -->
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center border border-primary-container/30 shadow-[0_0_20px_rgba(255,81,103,0.3)] mb-2 animate-pulse">
<span class="material-symbols-outlined text-[32px] text-[#FF2D55]" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<!-- Typography -->
<h1 class="text-[28px] leading-tight font-black text-white tracking-tight">Pehle batao kaun hai</h1>
<p class="text-[14px] text-white/70 font-normal">craving pakdne se pehle.</p>
</header>
<!-- Form Section -->
<form class="w-full flex flex-col gap-md" onsubmit="event.preventDefault(); this.querySelector('button').classList.add('opacity-80', 'scale-95'); setTimeout(() =&gt; this.querySelector('button').classList.remove('opacity-80', 'scale-95'), 200);">
<!-- Input Field Group -->
<div class="relative w-full group">
<input autocomplete="off" class="w-full h-[52px] px-4 rounded-[12px] glass-panel text-white font-body-lg placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-[#FF2D55] focus:border-transparent transition-all" id="detective-name" placeholder="Your name..." required="" type="text">
<div class="absolute inset-0 rounded-[12px] border border-white/20 pointer-events-none group-focus-within:border-[#FF2D55] transition-colors"></div>
</div>
<!-- CTA Button -->
<button class="w-full h-[56px] rounded-[12px] bg-[#FF2D55] text-white font-button text-[16px] uppercase tracking-wider flex justify-center items-center gap-2 btn-inner-glow transition-all duration-150" type="submit">CALL CHOR POLICE
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span></button>
</form>
</main>
<!-- Background Atmospheric Effects -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-primary-container rounded-full blur-[120px] opacity-10"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-surface-bright rounded-full blur-[100px] opacity-20"></div>
</div>


</body></html>
