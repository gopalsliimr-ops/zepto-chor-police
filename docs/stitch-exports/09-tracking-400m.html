<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Tracking (400m)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800;900&amp;family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#eedcff",
                        "on-secondary": "#5d1900",
                        "outline-variant": "#5d3f40",
                        "on-tertiary-fixed": "#3b0900",
                        "on-background": "#eedcff",
                        "error-container": "#93000a",
                        "surface-container-low": "#231437",
                        "tertiary": "#ffb5a0",
                        "primary-container": "#ff5167",
                        "on-error": "#690005",
                        "surface-container": "#27183c",
                        "tertiary-fixed-dim": "#ffb5a0",
                        "surface": "#1b0b2f",
                        "surface-container-high": "#322247",
                        "inverse-primary": "#be0036",
                        "surface-bright": "#423257",
                        "primary": "#ffb3b5",
                        "on-primary": "#680019",
                        "on-primary-fixed": "#40000c",
                        "inverse-on-surface": "#39294e",
                        "secondary-fixed": "#ffdbd0",
                        "on-tertiary": "#601400",
                        "primary-fixed": "#ffdada",
                        "surface-tint": "#ffb3b5",
                        "on-secondary-container": "#ffddd2",
                        "secondary-container": "#b83900",
                        "on-tertiary-container": "#541100",
                        "on-tertiary-fixed-variant": "#872000",
                        "on-primary-container": "#5b0015",
                        "surface-container-lowest": "#150529",
                        "surface-variant": "#3d2d52",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#832600",
                        "surface-dim": "#1b0b2f",
                        "on-secondary-fixed": "#390c00",
                        "tertiary-container": "#ff5625",
                        "background": "#1b0b2f",
                        "secondary": "#ffb59d",
                        "secondary-fixed-dim": "#ffb59d",
                        "on-surface-variant": "#e6bcbd",
                        "primary-fixed-dim": "#ffb3b5",
                        "surface-container-highest": "#3d2d52",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbd1",
                        "on-surface": "#eedcff",
                        "outline": "#ad8888",
                        "on-primary-fixed-variant": "#920027"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "gutter": "16px",
                        "xl": "64px",
                        "md": "24px",
                        "base": "8px",
                        "xs": "4px",
                        "margin-mobile": "16px",
                        "lg": "40px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "body-sm": ["DM Sans"],
                        "button": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "label-mono": ["Courier Prime"],
                        "headline-md": ["DM Sans"],
                        "display-lg-mobile": ["DM Sans"],
                        "display-lg": ["DM Sans"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-mono": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "1.1", "fontWeight": "900" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "900" }]
                    }
                }
            }
        }
    </script>
<style>
        .map-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .pulse-glow {
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(255, 81, 103, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 81, 103, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 81, 103, 0); }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-sm max-w-[390px] mx-auto relative overflow-hidden">
<!-- TopAppBar Semantic Shell -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 bg-surface/80 backdrop-blur-md dark:bg-surface/80 border-b border-white/20 fixed top-0 left-0 z-50">
<button class="text-primary dark:text-primary hover:bg-white/10 transition-colors p-2 rounded-full active:scale-95 duration-100 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">bolt</span>
</button>
<div class="flex items-center gap-2">
<h1 class="text-headline-md font-headline-md font-black italic tracking-tighter text-primary dark:text-primary">CHOR POLICE</h1>
<span class="bg-primary-container text-on-primary-container text-[10px] font-bold px-2 py-0.5 rounded-sm animate-pulse uppercase tracking-widest">Live</span>
</div>
<button class="text-primary dark:text-primary hover:bg-white/10 transition-colors p-2 rounded-full active:scale-95 duration-100 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">location_on</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-16 pb-24 flex flex-col relative z-10">
<!-- Abstract Map Area -->
<div aria-hidden="true" class="h-[260px] w-full bg-surface-container-high map-pattern relative overflow-hidden flex items-center justify-center px-6">
<!-- Route Line Base -->
<div class="w-full h-1 bg-white/10 rounded-full relative">
<!-- Route Line Progress -->
<div class="absolute top-0 left-0 h-full bg-primary-container rounded-full w-1/2"></div>
<!-- Origin -->
<div class="absolute top-1/2 left-0 -translate-y-1/2 -translate-x-1/2 w-10 h-10 bg-surface border border-white/20 rounded-full flex items-center justify-center backdrop-blur-md shadow-[0_0_15px_rgba(255,255,255,0.1)]">
<span class="material-symbols-outlined text-white/50 text-xl">storefront</span>
</div>
<!-- Rider Location -->
<div class="absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 w-11 h-11 bg-primary-container rounded-full flex items-center justify-center pulse-glow z-10 shadow-[0_0_20px_rgba(255,81,103,0.5)] border-2 border-background">
<span class="material-symbols-outlined text-on-primary-container text-xl" style="font-variation-settings: 'FILL' 1;">pedal_bike</span>
</div>
<!-- Destination -->
<div class="absolute top-1/2 right-0 -translate-y-1/2 translate-x-1/2 w-10 h-10 bg-surface border border-white/20 rounded-full flex items-center justify-center backdrop-blur-md">
<span class="material-symbols-outlined text-white/80 text-xl">home</span>
</div>
</div>
<!-- Ambient glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-primary-container/20 rounded-full blur-[40px] pointer-events-none"></div>
</div>
<!-- Tracking Details Card -->
<div class="flex-grow bg-white/5 backdrop-blur-[12px] border border-white/20 rounded-t-[24px] -mt-6 p-6 flex flex-col gap-6 relative z-20 shadow-[0_-8px_30px_rgba(0,0,0,0.4)]">
<!-- Progress Tracker -->
<div class="flex items-center justify-between px-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary-container shadow-[0_0_10px_rgba(255,81,103,0.5)]"></div>
<div class="flex-grow h-px bg-primary-container/50"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary-container shadow-[0_0_10px_rgba(255,81,103,0.5)]"></div>
<div class="flex-grow h-px bg-primary-container/50"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary-container shadow-[0_0_10px_rgba(255,81,103,0.5)]"></div>
<div class="flex-grow h-px bg-white/20"></div>
<div class="w-2.5 h-2.5 rounded-full bg-white/20"></div>
<div class="flex-grow h-px bg-white/20"></div>
<div class="w-2.5 h-2.5 rounded-full bg-white/20"></div>
</div>
<!-- Status Text -->
<div class="text-center mt-2 space-y-3">
<h2 class="font-headline-md text-[20px] font-extrabold text-white leading-tight"><span class="text-primary-container">400 metres.</span><br>The craving has been spotted.</h2>
<p class="font-label-mono text-label-mono text-on-surface-variant uppercase">Target will be caught.<br>Just a little more.</p>
</div>
<!-- Action Button -->
<div class="mt-auto">
<button class="w-full h-[56px] bg-primary-container text-on-primary-container font-button text-button rounded-xl flex items-center justify-center gap-2 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3),0_4px_15px_rgba(255,81,103,0.3)] hover:brightness-110 active:scale-[0.98] transition-all">NEXT STAGE <span class="material-symbols-outlined text-[20px]">arrow_forward</span></button>
</div>
</div>
</main>


</body></html>
