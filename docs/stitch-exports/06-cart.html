<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Chor Police - Cart / Evidence Secured</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&amp;family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#eedcff",
                        "on-secondary": "#5d1900",
                        "outline-variant": "#5d3f40",
                        "on-tertiary-fixed": "#3b0900",
                        "on-background": "#eedcff",
                        "error-container": "#93000a",
                        "surface-container-low": "#231437",
                        "tertiary": "#ffb5a0",
                        "primary-container": "#ff5167",
                        "on-error": "#690005",
                        "surface-container": "#27183c",
                        "tertiary-fixed-dim": "#ffb5a0",
                        "surface": "#1b0b2f",
                        "surface-container-high": "#322247",
                        "inverse-primary": "#be0036",
                        "surface-bright": "#423257",
                        "primary": "#ffb3b5",
                        "on-primary": "#680019",
                        "on-primary-fixed": "#40000c",
                        "inverse-on-surface": "#39294e",
                        "secondary-fixed": "#ffdbd0",
                        "on-tertiary": "#601400",
                        "primary-fixed": "#ffdada",
                        "surface-tint": "#ffb3b5",
                        "on-secondary-container": "#ffddd2",
                        "secondary-container": "#b83900",
                        "on-tertiary-container": "#541100",
                        "on-tertiary-fixed-variant": "#872000",
                        "on-primary-container": "#5b0015",
                        "surface-container-lowest": "#150529",
                        "surface-variant": "#3d2d52",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#832600",
                        "surface-dim": "#1b0b2f",
                        "on-secondary-fixed": "#390c00",
                        "tertiary-container": "#ff5625",
                        "background": "#1b0b2f",
                        "secondary": "#ffb59d",
                        "secondary-fixed-dim": "#ffb59d",
                        "on-surface-variant": "#e6bcbd",
                        "primary-fixed-dim": "#ffb3b5",
                        "surface-container-highest": "#3d2d52",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbd1",
                        "on-surface": "#eedcff",
                        "outline": "#ad8888",
                        "on-primary-fixed-variant": "#920027"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "gutter": "16px",
                        "xl": "64px",
                        "md": "24px",
                        "base": "8px",
                        "xs": "4px",
                        "margin-mobile": "16px",
                        "lg": "40px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "body-sm": ["DM Sans"],
                        "button": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "label-mono": ["Courier Prime"],
                        "headline-md": ["DM Sans"],
                        "display-lg-mobile": ["DM Sans"],
                        "display-lg": ["DM Sans"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-mono": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "1.1", "fontWeight": "900" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "900" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #1b0b2f; }
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .text-glow { text-shadow: 0 0 10px rgba(255, 81, 103, 0.5); }
    </style>
</head>
<body class="text-on-surface antialiased flex flex-col min-h-screen">
<!-- TopAppBar Semantic Mapping: Task-Focused/Linear Screen (Cart), nav shell hidden/modified. Using custom header per prompt -->
<header class="flex items-center justify-between px-margin-mobile h-16 bg-[#2D1554] border-b border-white/20 sticky top-0 z-50">
<button aria-label="Go back" class="text-on-surface hover:text-primary transition-colors flex items-center justify-center p-2 rounded-full hover:bg-white/10">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-[16px] text-white flex items-center gap-2">
<span class="">🗂️</span> Evidence Secured
        </h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col px-margin-mobile py-gutter gap-gutter max-w-[390px] mx-auto w-full">
<!-- Status Pill -->
<div class="self-center inline-flex items-center gap-xs px-3 py-1 rounded-full border border-[#22C55E] bg-[rgba(34,197,94,0.15)] shadow-[0_0_10px_rgba(34,197,94,0.3)]">
<span class="text-[#22C55E] text-[11px] font-[800] uppercase tracking-wider">🔒 CASE BUILDING</span>
</div>
<!-- Evidence List (Cart Items) -->
<div class="flex flex-col gap-base">
<h2 class="font-label-mono text-label-mono text-primary uppercase tracking-widest border-b border-white/20 pb-1">Exhibit A</h2>
<!-- Item Card -->
<div class="glass-panel rounded-lg p-3 flex items-center gap-3 relative overflow-hidden group hover:border-primary/50 transition-colors">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full duration-1000 ease-in-out pointer-events-none"></div>
<div class="w-16 h-16 rounded-md bg-surface-container-high flex items-center justify-center text-[36px] border border-white/10 shrink-0">
                    🍦
                </div>
<div class="flex-grow flex flex-col justify-between h-full py-1">
<h3 class="font-body-lg text-body-sm font-bold text-white line-clamp-2 leading-tight">Amul Kool Kone</h3>
<div class="font-label-mono text-label-mono text-tertiary">₹35.00</div>
</div>
<!-- Quantity Controls -->
<div class="flex flex-col items-center justify-between h-full bg-surface-container-high rounded-full border border-white/10 shrink-0 py-1 px-1">
<button aria-label="Increase quantity" class="w-6 h-6 rounded-full flex items-center justify-center text-on-surface-variant hover:text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[16px]">add</span>
</button>
<span class="font-body-sm text-body-sm font-bold text-white my-1">1</span>
<button aria-label="Decrease quantity" class="w-6 h-6 rounded-full flex items-center justify-center text-on-surface-variant hover:text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[16px]">remove</span>
</button>
</div>
</div>
</div>
<!-- Summary / FIR Card -->
<div class="mt-auto pt-md">
<div class="bg-[#f4f4f4] rounded-sm p-4 relative text-[#111] shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
<!-- Jagged Top Edge (CSS implementation) -->
<div class="absolute top-0 left-0 w-full h-[6px] bg-[#1b0b2f]" style="mask-image: radial-gradient(circle at 4px 6px, transparent 4px, black 5px); mask-size: 8px 10px; mask-repeat: repeat-x;"></div>
<div class="text-center mb-4 mt-2">
<h3 class="font-label-mono text-[14px] font-bold uppercase tracking-widest border-b border-[#333] pb-2 inline-block">Order Summary</h3>
</div>
<div class="space-y-2 font-label-mono text-[13px] text-[#333]">
<div class="flex justify-between items-center border-b border-dashed border-[#ccc] pb-1">
<span class="">Subtotal</span>
<span class="font-bold">₹35.00</span>
</div>
<div class="flex justify-between items-center border-b border-dashed border-[#ccc] pb-1">
<span class="">Delivery (Express)</span>
<span class="font-bold">₹15.00</span>
</div>
<div class="flex justify-between items-center pt-2 text-[16px] font-bold">
<span class="">Total</span>
<span class="">₹50.00</span>
</div>
</div>
<p class="font-label-mono text-[11px] text-[#666] text-center mt-4 italic">"Evidence secured. Ready for dispatch."</p>
<!-- Jagged Bottom Edge -->
<div class="absolute bottom-0 left-0 w-full h-[6px] bg-[#1b0b2f]" style="mask-image: radial-gradient(circle at 4px 0px, transparent 4px, black 5px); mask-size: 8px 10px; mask-repeat: repeat-x;"></div>
</div>
<!-- Proceed CTA -->
<button class="w-full mt-gutter h-[56px] bg-primary-container text-white font-button text-button rounded-lg flex items-center justify-center gap-2 shadow-[inset_0_0_10px_rgba(255,255,255,0.4),0_4px_15px_rgba(255,81,103,0.3)] hover:scale-[0.98] active:scale-95 transition-transform">PROCEED TO CASE <span class="material-symbols-outlined">arrow_forward</span></button>
</div>
</main>
<!-- Navigation Shell suppressed due to task-focused linear flow (Cart/Checkout) -->


</body></html>
